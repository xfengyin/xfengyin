name: ci-link-check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lychee:
    name: lychee link checker
    runs-on: ubuntu-latest
    # 允许失败 (因外部 stats 服务偶发抖动), 但通过 monitor-stats.yml 监控告警
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Lychee Link Checker
        uses: lycheeverse/lychee-action@v2
        with:
          args: --config .lycheecrc --no-progress **/*.md
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
