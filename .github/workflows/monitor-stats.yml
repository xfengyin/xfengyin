name: monitor-stats

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  monitor:
    name: Check external image sources
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Probe external image sources
        id: probe
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          # 待监测的图像源 URL 列表 (与 README 中保持一致)
          URLS=(
            "https://img.shields.io/badge/Python-3776AB?style=flat-square&logo=Python&logoColor=white"
            "https://img.shields.io/badge/Website-个人主页-4A4E50?style=flat-square"
            "https://github-readme-streak-stats.demolab.com/?user=xfengyin&theme=radical&hide_border=true"
            "https://komarev.com/ghpvc/?username=xfengyin&color=4A4E50&style=flat-square&label=PROFILE+VIEWS"
          )

          FAILED=()
          for url in "${URLS[@]}"; do
            status=$(curl -s -o /dev/null -w "%{http_code}" -L --max-time 15 "$url" || echo "000")
            if [[ "$status" != "200" ]]; then
              echo "FAIL $status $url"
              FAILED+=("$status $url")
            else
              echo "OK   $status $url"
            fi
          done

          if [ ${#FAILED[@]} -gt 0 ]; then
            {
              echo "## 外部图像源失效"
              echo ""
              echo "以下 URL 在体检中未返回 200:"
              echo ""
              for entry in "${FAILED[@]}"; do
                echo "- \`$entry\`"
              done
              echo ""
              echo "**处置**:"
              echo ""
              echo "1. 重试;若持续失败则替换图像源"
              echo "2. 修复后请手动关闭本 issue"
            } >> failure.txt
            exit 1
          fi
          echo "All external image sources are healthy."

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('failure.txt', 'utf8');
            const dateStr = new Date().toISOString().slice(0, 10);
            const title = `[monitor-alert] 外部图像源失效 (${dateStr})`;

            // Deduplication: check if an open issue with similar title already exists today
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'monitoring-alert',
            });
            const todayAlert = issues.find(i => i.title.includes(dateStr) && i.title.includes('外部图像源失效'));
            if (todayAlert) {
              console.log(`Open issue #${todayAlert.number} already exists for today, updating comment.`);
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: todayAlert.number,
                body: `## 再次检测到失效 (re-run)\n\n${body}`,
              });
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body + '\n\n---\n由 `monitor-stats.yml` 自动创建',
              labels: ['monitoring-alert', 'bug'],
            });
