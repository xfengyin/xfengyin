name: monitor-stats

on:
  # 每日 UTC 01:00 体检外部图像源
  schedule:
    - cron: "0 1 * * *"
  # 支持手动触发
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  monitor:
    name: Check external image sources
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Probe external image sources
        id: probe
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          # 待监测的图像源 URL 列表 (与 README 中保持一致)
          URLS=(
            "https://img.shields.io/badge/Python-3776AB?style=flat-square&logo=Python&logoColor=white"
            "https://img.shields.io/badge/Website-个人主页-4A4E50?style=flat-square"
            "https://github-readme-stats.vercel.app/api?username=xfengyin&show_icons=true&theme=radical"
            "https://github-readme-stats.vercel.app/api/top-langs/?username=xfengyin&layout=compact&theme=radical"
          )

          FAILED=()
          for url in "${URLS[@]}"; do
            # shields.io 与 stats 端返回 SVG; 用 -L 跟随重定向
            status=$(curl -s -o /dev/null -w "%{http_code}" -L --max-time 15 "$url" || echo "000")
            if [[ "$status" != "200" ]]; then
              echo "FAIL $status $url"
              FAILED+=("$status $url")
            else
              echo "OK   $status $url"
            fi
          done

          if [ ${#FAILED[@]} -gt 0 ]; then
            {
              echo "## 外部图像源失效"
              echo ""
              echo "以下 URL 在体检中未返回 200:"
              echo ""
              for entry in "${FAILED[@]}"; do
                echo "- \`$entry\`"
              done
              echo ""
              echo "**处置**:"
              echo ""
              echo "1. 若为 \`vercel.app\` 端长期不可用: 迁移至自托管 Action (见 ARCHITECTURE.md)"
              echo "2. 若为 shields.io 单次失败: 重试;若持续失败则调整 badge URL"
              echo "3. 修复后请手动关闭本 issue"
            } >> failure.txt
            exit 1
          fi
          echo "All external image sources are healthy."

      - name: Open issue on failure
        if: failure() && steps.probe.outputs.failed != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('failure.txt', 'utf8');
            const title = `[monitor-alert] 外部图像源失效 (${new Date().toISOString().slice(0,10)})`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body + '\n\n---\n由 `monitor-stats.yml` 自动创建',
              labels: ['monitoring-alert', 'bug'],
            });
