name: ci-data-check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  data-consistency:
    name: data/*.yml vs README.md
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install pyyaml
        run: pip install pyyaml
      - name: Run consistency check
        run: python scripts/check_data_consistency.py
